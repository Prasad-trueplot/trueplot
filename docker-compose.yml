services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trueplot_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: npm run dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trueplot_backend
    environment:
      APP_ENV: local
      API_HOST: 0.0.0.0
      API_PORT: 8000
      FRONTEND_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql+psycopg://trueplot_user:trueplot_pass@postgres:5432/trueplot
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16-alpine
    container_name: trueplot_postgres
    environment:
      POSTGRES_DB: trueplot
      POSTGRES_USER: trueplot_user
      POSTGRES_PASSWORD: trueplot_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trueplot_user -d trueplot"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  frontend_node_modules:
  frontend_next:
  postgres_data:
