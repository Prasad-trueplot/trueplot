name: Docker Validation

on:
  push:
  pull_request:

jobs:
  backend-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t trueplot-backend ./backend

  frontend-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t trueplot-frontend ./frontend
